<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ossia — Deep Agent UI</title>
    <link rel="icon" id="favicon" href="" />
    <!-- localStorage key must match src/constants.ts STORAGE_KEYS.DARK_MODE -->
    <script>
      try {
        var isDark = localStorage.getItem("ossia:darkMode") !== "false";
        document.documentElement.classList.toggle("dark", isDark);
        var faviconLink = document.getElementById("favicon");
        if (faviconLink) {
          var svg = isDark
            ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="#a78bfa" stroke-width="5.5"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="#7c3aed" stroke-width="5.5"/></svg>';
          faviconLink.href = "data:image/svg+xml;base64," + btoa(svg);
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
