apiVersion: serverless.nebius.ai/v1
kind: Endpoint
metadata:
  name: ossia-embedder
  namespace: ossia
spec:
  image: vllm/vllm-openai:v0.7.3
  model: sentence-transformers/all-MiniLM-L6-v2
  resources:
    gpu:
      type: nvidia-l40s
      count: 1
    cpu: 2
    memory: 16Gi
  minContainers: 0
  maxContainers: 2
