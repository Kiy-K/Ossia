# =============================================================================
# Grafana Datasources — Auto-Provisioned
# =============================================================================
# Grafana loads these on startup from /etc/grafana/provisioning/datasources/.
# No manual datasource setup needed after compose up.
# =============================================================================

apiVersion: 1

datasources:
  # ──────────────────────────────────────────────────────────────────
  # Prometheus — metrics storage and querying
  # ──────────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST

  # ──────────────────────────────────────────────────────────────────
  # Loki — log aggregation and querying
  # ──────────────────────────────────────────────────────────────────
  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Extract trace IDs from log lines for future Tempo integration
        - name: TraceID
          matcherType: label
          matcherRegex: '"trace_id":"([^"]+)"'
          url: ""  # Leave empty until Tempo is added
