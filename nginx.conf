# =============================================================================
# nginx.conf — Reverse proxy for Ossia
# =============================================================================
#
# This config is for use inside a Docker container. It proxies requests to
# the ossia service on the internal Docker network.
#
# SSL certs are expected at /etc/nginx/certs/ (bind-mount or certbot).
# For automatic Let's Encrypt, pair with the certbot sidecar in
# docker-compose.yml (commented out).
#
# =============================================================================

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic settings ─────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Don't leak nginx version

    # ─── MIME types ──────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────
    log_format ossia_json escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"x_forwarded_for": "$http_x_forwarded_for",'
        '"request_id": "$http_x_request_id",'
        '"method": "$request_method",'
        '"path": "$uri",'
        '"status": $status,'
        '"body_bytes": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_addr": "$upstream_addr",'
        '"upstream_status": "$upstream_status",'
        '"upstream_response_time": "$upstream_response_time",'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log ossia_json;
    error_log /var/log/nginx/error.log warn;

    # ─── Rate limiting zones ─────────────────────────────────────────
    # Limit POST to /v1/chat* to 60 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=chat:10m rate=60r/m;

    # ─── Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml
        text/javascript;

    # ─── Upstream — ossia Server ────────────────────────────────────
    upstream ossia_backend {
        # Simple load-balancing; add more ossia:8000 replicas for scaling
        server ossia:8000 max_fails=5 fail_timeout=30s;

        # Enable keepalive connections to the upstream
        keepalive 32;
    }

    # ─── HTTP -> HTTPS redirect (only when SSL is configured) ───────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # If serving without SSL, proxy directly:
        # location / {
        #     proxy_pass http://ossia_backend;
        #     include /etc/nginx/proxy_params.conf;
        # }
        # But with SSL certs in place, redirect to HTTPS:
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS server (SSL) ─────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        # ── SSL (bind-mount certs to /etc/nginx/certs/) ─────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS config
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Security headers ────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "same-origin" always;

        # ── Proxy to ossia ──────────────────────────────────────────
        location / {
            proxy_pass http://ossia_backend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;

            # WebSocket support (required for SSE streaming)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Buffering — disable for SSE to stream in real-time
            proxy_buffering off;
            proxy_cache off;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 300s;  # LLM calls can be slow

            # Keepalive to upstream
            proxy_set_header Connection "";

            # Body size (allow artifact uploads up to 50MB)
            client_max_body_size 50m;
        }

        # ── Rate limit on chat endpoints ────────────────────────────
        location /v1/chat {
            limit_req zone=chat burst=20 nodelay;
            proxy_pass http://ossia_backend;
            # (same proxy settings inherited via proxy_pass + manual headers)
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 300s;
            client_max_body_size 50m;
        }

        # ── Health check passthrough (no rate limit) ─────────────────
        location /health {
            proxy_pass http://ossia_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ── Deny access to sensitive paths ──────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
